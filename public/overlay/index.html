<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Overlay</title>

  <link rel="stylesheet" href="/overlay/overlay.css" />
</head>

<body>
  <div id="chat-container"></div>

  <script type="module">
    // ⭐ CORRECT PATH BASED ON YOUR REAL FILE STRUCTURE
    import { renderMessage } from "../platforms/router.js";

    const container = document.getElementById("chat-container");

    const ws = new WebSocket(location.href.replace("http", "ws"));

    ws.addEventListener("message", event => {
      let msg;
      try {
        msg = JSON.parse(event.data);
      } catch {
        return;
      }

      // Your renderers return { element, cleanup }
      const rendered = renderMessage(msg);
      if (!rendered) return;

      const { element, cleanup } = rendered;

      if (element instanceof HTMLElement) {
        container.appendChild(element);
      }

      if (typeof cleanup === "function") {
        cleanup();
      }

      // Trim old messages
      while (container.children.length > 50) {
        container.removeChild(container.firstChild);
      }
    });
  </script>
</body>
</html>
