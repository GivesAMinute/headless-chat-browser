<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Overlay</title>

  <link rel="stylesheet" href="overlay.css" />
</head>

<body>
  <div id="messages"></div>

  <script type="module">
    // ⭐ Correct path: index.html → overlay → public → root → platforms
    import { renderMessage } from "../../platforms/router.js";

    console.log("Overlay script loaded");

    const messagesContainer = document.getElementById("messages");

    // ⭐ MUST connect to the exact overlay URL
    const ws = new WebSocket(
      location.href.replace("http", "ws")
    );

    ws.addEventListener("open", () => console.log("WS CONNECTED"));
    ws.addEventListener("error", (e) => console.log("WS ERROR", e));
    ws.addEventListener("close", () => console.log("WS CLOSED"));

    ws.addEventListener("message", event => {
      let msg;
      try {
        msg = JSON.parse(event.data);
      } catch (err) {
        console.error("Invalid JSON:", err);
        return;
      }

      const { element, cleanup } = renderMessage(msg);
      messagesContainer.appendChild(element);

      if (typeof cleanup === "function") cleanup();
    });
  </script>
</body>
</html>
