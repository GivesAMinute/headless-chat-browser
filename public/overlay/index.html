<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Merged Chat Overlay</title>

<link rel="stylesheet" href="overlay.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>
<div id="messages"></div>

<script>
  if (window.__CHAT_OVERLAY_CONNECTED__) {
    console.log("Overlay already connected, skipping duplicate WS");
    throw new Error("Duplicate overlay instance");
  }
  window.__CHAT_OVERLAY_CONNECTED__ = true;

  const ws = new WebSocket("wss://" + location.host);

  const PLATFORM_MAP = {
    youtube: "youtube",
    "youtube.com": "youtube",
    yt: "youtube",

    velora: "velora",
    "velora.live": "velora",

    pilled: "pilled",
    "pilled.net": "pilled",

    nimotv: "nimotv",
    nimo: "nimotv",

    kick: "kick",
    "kick.com": "kick",

    rumble: "rumble",
    odysee: "odysee",
    arena: "arena",

    blaze: "blaze",

    bitchute: "bitchute",
    vpzone: "vpzone",

    twitch: "twitch",
    beam: "beam"
  };

  function getPlatformIcon(platform) {
    platform = platform.toLowerCase();
    const mapped = PLATFORM_MAP[platform];
    if (mapped === null) return null;
    if (mapped) return `/icons/${mapped}.png`;
    return `/icons/default.png`;
  }

  function colorForUsername(name, platform) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
      hash = (hash * 31 + name.charCodeAt(i)) | 0;
    }
    const index = Math.abs(hash);

    const palettes = {
      twitch: ["#9146FF","#A970FF","#B98CFF","#7C4DFF","#9B59FF","#8E44FF","#A55BFF","#C39BFF","#6E3CE6","#B084FF","#9F6BFF","#7A3FE6"],
      youtube: ["#FF0000","#FF1A1A","#FF3333","#FF4D4D","#FF6666","#E60000","#CC0000","#FF5E57","#FF2D55","#FF3B30","#FF6A6A","#FF7F7F"],
      velora: ["#F5C451","#F7D06A","#FFD97A","#E8B23A","#E6A93E","#FFCC66","#FFDB85","#F2B94F","#DFA63A","#F8D88C","#E4B75A","#F0C76E"],
      kick: ["#00FF66","#00E65C","#00CC52","#00B347","#00993D","#00FF7A","#00FF55","#00E64D","#00CC44","#00B33A","#00FF88","#00FF99"],
      rumble: ["#00AA44","#00993D","#008833","#00772A","#006622","#00BB55","#00CC66","#00994D","#008040","#007338","#00D46A","#00C45C"],
      beam: ["#00E0FF","#33E8FF","#66F0FF","#00C8E6","#00B0CC","#00F2FF","#4DF6FF","#80FAFF","#00D4E6","#00BED1","#00E8F2","#33F0FF"],
      blaze: ["#FF8800","#FF9C33","#FFB566","#FF7A00","#E66F00","#CC6400","#FF9933","#FFB266","#FF8C1A","#FF751A","#E67300","#CC6600"]
    };

    const palette = palettes[platform];
    if (palette) return palette[index % palette.length];

    const hue = index % 360;
    return `hsl(${hue}, 70%, 60%)`;
  }

  /* ROLE ICONS (unchanged) */
  const MOD_SVG = `...`;
  const OG_SVG = `...`;
  const VIP_SVG = `...`;
  const STREAMER_SVG = `...`;

  // Velora avatar fallback
  async function ensureVeloraAvatar(msg) {
    if (msg.platform !== "velora") return msg;
    if (msg.avatar && typeof msg.avatar === "string" && msg.avatar.startsWith("http")) {
      return msg;
    }
    if (!msg.username) return msg;

    try {
      const res = await fetch(
        `https://velora.tv/api/users/${encodeURIComponent(msg.username)}`,
        { method: "GET" }
      );
      if (!res.ok) return msg;

      const data = await res.json();
      if (data && typeof data.avatarUrl === "string" && data.avatarUrl.startsWith("http")) {
        msg.avatar = data.avatarUrl;
      }
    } catch (e) {
      console.warn("Velora avatar fetch failed in overlay:", e);
    }
    return msg;
  }

  ws.onmessage = async (event) => {
    let msg = JSON.parse(event.data);

    msg = await ensureVeloraAvatar(msg);

    const wrapper = document.createElement("div");
    wrapper.className = "msg";

    // Keep platform class (this is harmless + useful)
    if (msg.platform) {
      wrapper.classList.add(`platform-${msg.platform.toLowerCase()}`);
    }

    /* PLATFORM ICON */
    const iconPath = getPlatformIcon(msg.platform);
    if (iconPath) {
      wrapper.insertAdjacentHTML("beforeend", `
        <span class="tooltip-wrapper">
          <img class="platform-icon" src="${iconPath}">
          <span class="tooltip-bubble">${msg.platform.toUpperCase()}</span>
        </span>
      `);
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const content = document.createElement("div");
    content.className = "content";

    /* INLINE AVATAR */
    if (msg.avatar && typeof msg.avatar === "string" && msg.avatar.startsWith("http")) {
      const inlineAvatar = document.createElement("img");
      inlineAvatar.className = "inline-avatar";
      inlineAvatar.src = msg.avatar;
      content.appendChild(inlineAvatar);
    }

    /* Velora badges */
    if (msg.platform === "velora" && msg.badges?.length) {
      msg.badges.forEach(src => {
        const label = src.split("/").pop().replace(/\.(png|svg)/, "");
        content.insertAdjacentHTML("beforeend", `
          <span class="tooltip-wrapper">
            <img class="velora-inline-badge" src="${src}">
            <span class="tooltip-bubble">${label}</span>
          </span>
        `);
      });
    }

    /* Blaze role icons */
    if (msg.platform === "blaze") {
      if (msg.isMod)      content.insertAdjacentHTML("beforeend", MOD_SVG);
      if (msg.isOG)       content.insertAdjacentHTML("beforeend", OG_SVG);
      if (msg.isVIP)      content.insertAdjacentHTML("beforeend", VIP_SVG);
      if (msg.isStreamer) content.insertAdjacentHTML("beforeend", STREAMER_SVG);
    }

    /* Universal badges */
    if (msg.platform !== "velora" && msg.badges?.length) {
      msg.badges.forEach(src => {
        const label = src.split("/").pop().replace(/\.(png|svg)/, "");
        content.insertAdjacentHTML("beforeend", `
          <span class="tooltip-wrapper">
            <img class="velora-inline-badge" src="${src}">
            <span class="tooltip-bubble">${label}</span>
          </span>
        `);
      });
    }

    /* USERNAME */
    let cleanName = msg.username;
    if (msg.platform === "youtube" && cleanName?.startsWith("@")) {
      cleanName = cleanName.substring(1);
    }

    const name = document.createElement("div");
    name.className = "username";
    name.textContent = cleanName || "";
    name.style.color = colorForUsername(cleanName || "", msg.platform);
    content.appendChild(name);

    /* MESSAGE TEXT */
    const text = document.createElement("div");
    text.className = "text";
    text.innerHTML = msg.html;

    text.querySelectorAll("img").forEach(img => {
      const isSmall =
        (img.naturalWidth && img.naturalWidth <= 40) ||
        (img.width && img.width <= 40);

      if (!isSmall) return;

      if (["youtube", "velora", "blaze"].includes(msg.platform)) {
        img.classList.add("scaled-emote");
      }
    });

    text.querySelectorAll("video").forEach(v => {
      v.muted = true;
      v.autoplay = true;
      v.loop = true;
      v.playsInline = true;
      v.play().catch(() => {});
    });

    content.appendChild(text);

    bubble.appendChild(content);
    wrapper.appendChild(bubble);

    document.getElementById("messages").appendChild(wrapper);

    /* Swipe-left exit */
    setTimeout(() => {
      bubble.classList.add("fadeOut");
      setTimeout(() => wrapper.remove(), 600);
    }, 45000);
  };
</script>
</body>
</html>
