<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Headless Chat Overlay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      font-family: Inter, system-ui, sans-serif;
    }

    #messages {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 20px;
      box-sizing: border-box;
    }

    .msg {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      animation: fadeIn 0.25s ease-out;
    }

    .platform-icon,
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .bubble {
      background: rgba(0, 0, 0, 0.55);
      padding: 8px 12px;
      border-radius: 12px;
      max-width: 70%;
      backdrop-filter: blur(6px);
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .username {
      font-weight: 600;
      font-size: 14px;
      line-height: 1.2;
    }

    .content img.scaled-emote {
      width: 32px;
      height: 32px;
      object-fit: contain;
      vertical-align: middle;
    }

    .tooltip-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin-right: 4px;
    }

    .tooltip-bubble {
      position: absolute;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%);
      background: #000;
      color: #fff;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease-out;
    }

    .tooltip-wrapper:hover .tooltip-bubble {
      opacity: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fadeOut {
      animation: fadeOut 0.6s forwards;
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(-20px); }
    }
    
/* -----------------------------
   BEAM-SPECIFIC RESTORATION
------------------------------*/

.beam-msg .avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

.beam-msg .bubble {
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 20px;
  max-width: 90%;
  backdrop-filter: blur(6px);
}

.beam-msg .username {
  font-weight: 600;
  margin-bottom: 4px;
  display: inline-block;
  color: inherit; /* colorForUsername() handles this */
}

.beam-msg .content {
  color: white;
}

.beam-msg .content div {
  color: white;
}

.beam-msg img.scaled-emote {
  width: 48px !important;
  height: 48px !important;
}

.beam-msg .msg {
  gap: 10px;
}

  </style>
</head>

<body>
  <div id="messages"></div>

  <script type="module">
    import { renderMessage } from "/platforms/router.js";

    const messages = document.getElementById("messages");

    function connect() {
      const ws = new WebSocket(`wss://${location.host}`);

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        const { element, cleanup } = renderMessage(msg);

        messages.appendChild(element);

        cleanup?.();
      };

      ws.onclose = () => {
        setTimeout(connect, 2000);
      };
    }

    connect();
  </script>
</body>
</html>
