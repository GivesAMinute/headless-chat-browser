<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Overlay</title>

  <!-- External unified stylesheet -->
  <link rel="stylesheet" href="overlay.css" />
</head>

<body>
  <div id="messages"></div>

  <script type="module">
    import { renderMessage } from "./router.js";

    const messagesContainer = document.getElementById("messages");

    // Connect to your backend WebSocket
    const ws = new WebSocket("wss://your-railway-url-here");

    ws.addEventListener("message", event => {
      let msg;
      try {
        msg = JSON.parse(event.data);
      } catch (err) {
        console.error("Invalid JSON:", err);
        return;
      }

      const { element, cleanup } = renderMessage(msg);

      messagesContainer.appendChild(element);

      // Run platform cleanup (fade-out + removal)
      if (typeof cleanup === "function") {
        cleanup();
      }
    });
  </script>
</body>
</html>
