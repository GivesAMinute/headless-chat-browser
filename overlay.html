<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Merged Chat Overlay</title>

<style>
  body {
    margin: 0;
    background: transparent;
    font-family: Inter, sans-serif;
    overflow: hidden;
  }

  #messages {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    display: flex;
    gap: 10px;
  }

  .platform-icon {
    width: 40px;
    height: 40px;
  }

  .bubble {
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 20px;
    max-width: 90%;
    backdrop-filter: blur(6px);
  }

  .username {
    font-weight: 600;
    margin-right: 6px;
  }

  .role-icon {
    width: 16px;
    height: 16px;
    vertical-align: middle;
    margin-right: 4px;
  }
</style>
</head>

<body>
<div id="messages"></div>

<script>
const STREAMER_SVG = `
<svg class="role-icon" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="red" stroke-width="2.2" viewBox="0 0 24 24"><path d="M12 19v3"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><rect x="9" y="2" width="6" height="13" rx="3"></rect></svg>
`;

const MOD_SVG = `
<svg class="role-icon" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#2563eb" stroke-width="2.2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
`;

const OG_SVG = `
<svg class="role-icon" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#ea580c" stroke-width="2.2" viewBox="0 0 24 24"><path d="M8.5 14.5a3.5 3.5 0 1 0 7 0c0-2.5-3.5-5-3.5-8 0 3-3.5 5.5-3.5 8z"></path></svg>
`;

const VIP_SVG = `
<svg class="role-icon" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#eab308" stroke-width="2.2" viewBox="0 0 24 24"><polygon points="12 2 15 8.5 22 9.3 17 14 18.5 21 12 17.5 5.5 21 7 14 2 9.3 9 8.5 12 2"></polygon></svg>
`;

const ws = new WebSocket("wss://" + location.host);

ws.onmessage = (event) => {
  const msg = JSON.parse(event.data);

  const wrapper = document.createElement("div");
  wrapper.className = "msg";

  const icon = document.createElement("img");
  icon.className = "platform-icon";
  icon.src = `/icons/${msg.platform}.png`;
  wrapper.appendChild(icon);

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  const content = document.createElement("div");

  // ⭐ Role icons
  if (msg.platform === "blaze") {
    if (msg.isStreamer) content.innerHTML += STREAMER_SVG;
    if (msg.isMod)      content.innerHTML += MOD_SVG;
    if (msg.isOG)       content.innerHTML += OG_SVG;
    if (msg.isVIP)      content.innerHTML += VIP_SVG;
  }

  const name = document.createElement("span");
  name.className = "username";
  name.textContent = msg.username;
  content.appendChild(name);

  const text = document.createElement("span");
  text.innerHTML = msg.html;
  content.appendChild(text);

  bubble.appendChild(content);
  wrapper.appendChild(bubble);

  document.getElementById("messages").appendChild(wrapper);
};
</script>
</body>
</html>
