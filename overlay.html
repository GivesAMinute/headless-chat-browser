<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Merged Chat Overlay</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

  body {
    margin: 0;
    background: transparent;
    font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }

  #messages {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: flex-start;
  }

  .msg {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .platform-icon {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .bubble {
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 20px;
    max-width: 90%;
    display: inline-block;
    backdrop-filter: blur(6px);
    animation: fadeIn 0.8s ease-out;
    word-break: break-word;
    white-space: normal;
  }

  .username {
    font-weight: 600;
    margin-bottom: 4px;
    display: inline-block;
  }

  /* OG: outline-only orange rectangle */
  .blaze-og-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #ff6600;
    color: #ff6600;
    background: transparent;
    padding: 1px 4px;
    border-radius: 4px;
    margin-right: 4px;
    height: 14px;
  }

  .blaze-og-badge svg {
    width: 12px;
    height: 12px;
  }

  /* VIP: outline-only yellow rectangle */
  .blaze-vip-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border: 1px solid #facc15;
    color: #facc15;
    background: transparent;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    line-height: 1;
    margin-right: 4px;
    height: 14px;
  }

  .blaze-vip-badge img {
    width: 12px;
    height: 12px;
  }

  /* 16px size for moderator + streamer icons */
  .blaze-large-icon {
    width: 16px !important;
    height: 16px !important;
    margin-right: 4px;
    vertical-align: middle;
  }

  .velora-inline-badge {
    width: 12px;
    height: 12px;
    margin-right: 4px;
    vertical-align: middle;
    display: inline-block;
    background: none !important;
    border: none !important;
    padding: 0 !important;
  }

  /* Tooltip system */
  .tooltip-wrapper {
    position: relative;
    display: inline-flex;
  }

  .tooltip-bubble {
    position: absolute;
    bottom: 125%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity .15s ease-out;
  }

  .tooltip-wrapper:hover .tooltip-bubble {
    opacity: 1;
  }

  /* Swipe-left exit animation */
  @keyframes swipeLeft {
    from {
      opacity: 1;
      transform: translateX(0);
    }
    to {
      opacity: 0;
      transform: translateX(-200px);
    }
  }

  .fadeOut {
    animation: swipeLeft 0.6s ease-out forwards;
  }

  .bubble img.chat-image {
    width: 64px;
    height: 64px;
    display: inline-block;
    vertical-align: middle;
  }

  .bubble img:not(.chat-image) {
    max-height: 80px;
  }

  .bubble img.scaled-emote {
    width: 48px !important;
    height: 48px !important;
    vertical-align: middle;
    display: inline-block;
  }

  .bubble video {
    display: block;
    margin-top: 6px;
    max-height: 140px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>
<div id="messages"></div>

<script>
  if (window.__CHAT_OVERLAY_CONNECTED__) {
    console.log("Overlay already connected, skipping duplicate WS");
    throw new Error("Duplicate overlay instance");
  }
  window.__CHAT_OVERLAY_CONNECTED__ = true;

  const ws = new WebSocket("wss://" + location.host);

  const PLATFORM_MAP = {
    youtube: "youtube",
    "youtube.com": "youtube",
    yt: "youtube",

    velora: "velora",
    "velora.live": "velora",

    pilled: "pilled",
    "pilled.net": "pilled",

    nimotv: "nimotv",
    nimo: "nimotv",

    kick: "kick",
    "kick.com": "kick",

    rumble: "rumble",
    odysee: "odysee",
    arena: "arena",

    blaze: "blaze",

    bitchute: "bitchute",
    vpzone: "vpzone",

    twitch: "twitch",
    beam: null
  };

  function getPlatformIcon(platform) {
    platform = platform.toLowerCase();
    const mapped = PLATFORM_MAP[platform];
    if (mapped === null) return null;
    if (mapped) return `/icons/${mapped}.png`;
    return `/icons/default.png`;
  }

  function colorForUsername(name, platform) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
      hash = (hash * 31 + name.charCodeAt(i)) | 0;
    }
    const index = Math.abs(hash);

    const palettes = {
      twitch: ["#9146FF","#A970FF","#B98CFF","#7C4DFF","#9B59FF","#8E44FF","#A55BFF","#C39BFF","#6E3CE6","#B084FF","#9F6BFF","#7A3FE6"],
      youtube: ["#FF0000","#FF1A1A","#FF3333","#FF4D4D","#FF6666","#E60000","#CC0000","#FF5E57","#FF2D55","#FF3B30","#FF6A6A","#FF7F7F"],
      velora: ["#F5C451","#F7D06A","#FFD97A","#E8B23A","#E6A93E","#FFCC66","#FFDB85","#F2B94F","#DFA63A","#F8D88C","#E4B75A","#F0C76E"],
      kick: ["#00FF66","#00E65C","#00CC52","#00B347","#00993D","#00FF7A","#00FF55","#00E64D","#00CC44","#00B33A","#00FF88","#00FF99"],
      rumble: ["#00AA44","#00993D","#008833","#00772A","#006622","#00BB55","#00CC66","#00994D","#008040","#007338","#00D46A","#00C45C"],
      beam: ["#00E0FF","#33E8FF","#66F0FF","#00C8E6","#00B0CC","#00F2FF","#4DF6FF","#80FAFF","#00D4E6","#00BED1","#00E8F2","#33F0FF"],
      blaze: ["#FF8800","#FF9C33","#FFB566","#FF7A00","#E66F00","#CC6400","#FF9933","#FFB266","#FF8C1A","#FF751A","#E67300","#CC6600"]
    };

    const palette = palettes[platform];
    if (palette) return palette[index % palette.length];

    const hue = index % 360;
    return `hsl(${hue}, 70%, 60%)`;
  }

  /* ROLE ICONS */

  const MOD_SVG = `
<span class="tooltip-wrapper">
  <svg class="blaze-large-icon" xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.2"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
  </svg>
  <span class="tooltip-bubble">Moderator</span>
</span>`;

  const OG_SVG = `
<span class="tooltip-wrapper">
  <span class="blaze-og-badge">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
    </svg>
  </span>
  <span class="tooltip-bubble">OG</span>
</span>`;

  const VIP_SVG = `
<span class="tooltip-wrapper">
  <span class="blaze-vip-badge">
    <img src="https://cdn.blaze.stream/site/icons/vip.png" alt="">
    <span>VIP</span>
  </span>
  <span class="tooltip-bubble">VIP</span>
</span>`;

  const STREAMER_SVG = `
<span class="tooltip-wrapper">
  <svg class="blaze-large-icon" xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 24 24" fill="none" stroke="red" stroke-width="2.2"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 19v3"></path>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
    <rect x="9" y="2" width="6" height="13" rx="3"></rect>
  </svg>
  <span class="tooltip-bubble">Streamer</span>
</span>`;

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    const wrapper = document.createElement("div");
    wrapper.className = "msg";

    /* PLATFORM ICON WITH TOOLTIP */
    if (msg.platform === "beam" && msg.avatar) {
      const img = document.createElement("img");
      img.className = "avatar";
      img.src = msg.avatar;
      wrapper.appendChild(img);
    } else {
      const iconPath = getPlatformIcon(msg.platform);
      if (iconPath) {
        const iconHTML = `
          <span class="tooltip-wrapper">
            <img class="platform-icon" src="${iconPath}">
            <span class="tooltip-bubble">${msg.platform.toUpperCase()}</span>
          </span>`;
        wrapper.insertAdjacentHTML("beforeend", iconHTML);
      }
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const content = document.createElement("div");
    content.className = "content";

    /* Velora badges WITH TOOLTIP */
    if (msg.platform === "velora" && msg.badges?.length) {
      msg.badges.forEach(src => {
        const label = src.split("/").pop().replace(/\.(png|svg)/, "");
        content.insertAdjacentHTML("beforeend", `
          <span class="tooltip-wrapper">
            <img class="velora-inline-badge" src="${src}">
            <span class="tooltip-bubble">${label}</span>
          </span>
        `);
      });
    }

    /* Blaze role icons (Mod → OG → VIP → Streamer) */
    if (msg.platform === "blaze") {
      if (msg.isMod)      content.insertAdjacentHTML("beforeend", MOD_SVG);
      if (msg.isOG)       content.insertAdjacentHTML("beforeend", OG_SVG);
      if (msg.isVIP)      content.insertAdjacentHTML("beforeend", VIP_SVG);
      if (msg.isStreamer) content.insertAdjacentHTML("beforeend", STREAMER_SVG);
    }

    /* Universal badges WITH TOOLTIP */
    if (msg.platform !== "velora" && msg.badges?.length) {
      msg.badges.forEach(src => {
        const label = src.split("/").pop().replace(/\.(png|svg)/, "");
        content.insertAdjacentHTML("beforeend", `
          <span class="tooltip-wrapper">
            <img class="velora-inline-badge" src="${src}">
            <span class="tooltip-bubble">${label}</span>
          </span>
        `);
      });
    }

    let cleanName = msg.username;
    if (msg.platform === "youtube" && cleanName.startsWith("@")) {
      cleanName = cleanName.substring(1);
    }

    const name = document.createElement("div");
    name.className = "username";
    name.textContent = cleanName;
    name.style.color = colorForUsername(cleanName, msg.platform);
    content.appendChild(name);

    const text = document.createElement("div");
    text.innerHTML = msg.html;

    text.querySelectorAll("img").forEach(img => {
      const isSmall =
        (img.naturalWidth && img.naturalWidth <= 40) ||
        (img.width && img.width <= 40);

      if (!isSmall) return;

      if (msg.platform === "youtube" ||
          msg.platform === "velora" ||
          msg.platform === "blaze") {
        img.classList.add("scaled-emote");
      }
    });

    text.querySelectorAll("video").forEach(v => {
      v.muted = true;
      v.autoplay = true;
      v.loop = true;
      v.playsInline = true;
      v.play().catch(() => {});
    });

    content.appendChild(text);

    bubble.appendChild(content);
    wrapper.appendChild(bubble);

    document.getElementById("messages").appendChild(wrapper);

    /* Swipe-left exit */
    setTimeout(() => {
      bubble.classList.add("fadeOut");
      setTimeout(() => wrapper.remove(), 600);
    }, 45000);
  };
</script>
</body>
</html>
